<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        height: 100vh;
        width: 100vw;
       
    }
    .main{
        height: 100%;
        width: 100%;
        background-color: rgb(98, 71, 10);
        display: flex;
        overflow: hidden;
    }
.part1{
    height: 100%;
    width: 30%;

}
.part2{
    height: 100%;
    width: 100%;
    background-image: url(wesley-tingey-ODG3C3udpsc-unsplash.jpg);
    background-size: cover;
    position: relative;
    left: 18%;
   
}


.text{   
    height: 400px;
    width: 500px;
    position: relative;
    top: 30%;
    right:50%;}
.text h1{
    line-height: 65px;
    color: #fff;
    font-size: 80px;
    font-weight: 900;
    font-family:Arial, Helvetica, sans-serif;
    text-transform:uppercase;
    

}
.image{
    height: 50%;
    width: 35%;
    background-image: url(wesley-tingey-JOhjfzjeJLw-unsplash.jpg);
    background-size: cover;
    position: relative;
    top: 25%;
    left: 80%;
    border-radius: 30px;
}
.para{
    position: relative;
    left: 60%;

}
.para h1{
    color:transparent;
    font-weight: 900;
    transform: rotate(90deg);
    font-size: 75px;
    font-family: Arial, Helvetica, sans-serif;
    -webkit-text-stroke-width: 2px;
    -webkit-text-stroke-color: #fff;
    text-transform: uppercase;
}

</style>
</head>
<body>
    <div class="main">

        <div class="part1"></div>
        <div class="part2">
            <div class="image"></div>
            <div class="para">
                <h1>visit unsplash</h1>
            </div>
        </div>
        <div class="part3"> </div>
        <div class="text">
            <h1>nature</h1>
            <h1>morte</h1>
            <h1>for</h1>
            <h1>harper's</h1>
        </div>
   
        
    </div>
</body>
</html>
