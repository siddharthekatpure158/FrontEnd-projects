<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #0f172a);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        /* Animated background glow */
        body::before {
            content: "";
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #38bdf8, transparent);
            top: -100px;
            left: -100px;
            filter: blur(120px);
            animation: moveGlow 8s infinite alternate;
            z-index: -1;
        }

        @keyframes moveGlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(200px, 150px); }
        }

        h1 {
            text-align: center;
            margin-top: 40px;
            font-size: 2.8rem;
            background: linear-gradient(90deg, #38bdf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeDown 1s ease;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding: 50px;
        }

        /* CARD AS LINK */
        .card {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            animation: fadeUp 0.8s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glow overlay */
        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(56,189,248,0.4), transparent);
            opacity: 0;
            transition: 0.5s;
            pointer-events: none; /* IMPORTANT FIX */
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                padding: 20px;
            }
        }

    </style>
</head>
<body>

<h1>🚀 My Frontend Projects</h1>

<div class="container">

    <a href="./1/index.html" class="card">🚀 Project 1</a>
    <a href="./2/index.html" class="card">🚀 Project 2</a>
    <a href="./3/index.html" class="card">🚀 Project 3</a>
    <a href="./4/index.html" class="card">🚀 Project 4</a>
    <a href="./5/index.html" class="card">🚀 Project 5</a>
    <a href="./6/index.html" class="card">🚀 Project 6</a>
    <a href="./7/index.html" class="card">🚀 Project 7</a>
    <a href="./8/index.html" class="card">🚀 Project 8</a>

</div>

</body>
</html>
